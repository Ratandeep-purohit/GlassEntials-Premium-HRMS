{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ status_code }} | GlassEntials HRMS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap">
    <style>
        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --line: #dbe4ef;
            --panel: rgba(255, 255, 255, 0.9);
            --blue: #2563eb;
            --green: #16a34a;
            --amber: #d97706;
            --red: #dc2626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 28px;
            color: var(--ink);
            font-family: "Plus Jakarta Sans", Arial, sans-serif;
            background:
                linear-gradient(135deg, rgba(37, 99, 235, 0.08), transparent 34%),
                linear-gradient(315deg, rgba(22, 163, 74, 0.08), transparent 32%),
                #f8fafc;
        }

        .error-shell {
            width: min(940px, 100%);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 260px;
            gap: 22px;
            align-items: stretch;
        }

        .error-panel,
        .status-panel {
            background: var(--panel);
            border: 1px solid rgba(219, 228, 239, 0.95);
            border-radius: 22px;
            box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .error-panel {
            padding: clamp(28px, 6vw, 54px);
        }

        .logo {
            width: 188px;
            max-width: 70%;
            height: auto;
            margin-bottom: 38px;
            display: block;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            min-height: 34px;
            padding: 0 12px;
            border-radius: 999px;
            background: #eff6ff;
            color: var(--blue);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .tone-danger .eyebrow {
            background: #fef2f2;
            color: var(--red);
        }

        .tone-warning .eyebrow {
            background: #fffbeb;
            color: var(--amber);
        }

        h1 {
            margin: 20px 0 14px;
            font-family: "Manrope", "Plus Jakarta Sans", Arial, sans-serif;
            font-size: clamp(34px, 5vw, 58px);
            line-height: 1.03;
            letter-spacing: 0;
        }

        .message {
            max-width: 590px;
            margin: 0;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.75;
            font-weight: 600;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 0 20px;
            border-radius: 14px;
            font-weight: 850;
            text-decoration: none;
            border: 1px solid transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
            box-shadow: 0 14px 28px rgba(37, 99, 235, 0.22);
        }

        .tone-danger .btn-primary {
            background: var(--red);
            box-shadow: 0 14px 28px rgba(220, 38, 38, 0.2);
        }

        .btn-secondary {
            background: #fff;
            color: var(--ink);
            border-color: var(--line);
        }

        .status-panel {
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 28px;
            overflow: hidden;
        }

        .status-code {
            font-family: "Manrope", "Plus Jakarta Sans", Arial, sans-serif;
            font-size: clamp(70px, 12vw, 124px);
            line-height: 0.9;
            font-weight: 800;
            color: rgba(37, 99, 235, 0.14);
        }

        .tone-danger .status-code {
            color: rgba(220, 38, 38, 0.14);
        }

        .tone-warning .status-code {
            color: rgba(217, 119, 6, 0.16);
        }

        .support-note {
            border-top: 1px solid var(--line);
            padding-top: 18px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.65;
            font-weight: 650;
        }

        @media (max-width: 820px) {
            body {
                padding: 16px;
            }

            .error-shell {
                grid-template-columns: 1fr;
            }

            .status-panel {
                min-height: 170px;
            }

            .logo {
                margin-bottom: 28px;
            }
        }
    </style>
</head>
<body class="tone-{{ tone }}">
    <main class="error-shell" role="main">
        <section class="error-panel" aria-labelledby="error-title">
            <img class="logo" src="{% static 'img/logo-letterhead.png' %}" alt="GlassEntials">
            <span class="eyebrow">{{ eyebrow }}</span>
            <h1 id="error-title">{{ title }}</h1>
            <p class="message">{{ message }}</p>
            <div class="actions">
                <a class="btn btn-primary" href="{{ action_url }}">{{ action_label }}</a>
                <button class="btn btn-secondary" type="button" onclick="history.length > 1 ? history.back() : window.location.assign('{{ action_url }}')">Go Back</button>
            </div>
        </section>

        <aside class="status-panel" aria-label="Error status">
            <div class="status-code">{{ status_code }}</div>
            <div class="support-note">
                If this happens again, share this page code with HR/Admin so they can check the server logs.
            </div>
        </aside>
    </main>
</body>
</html>
