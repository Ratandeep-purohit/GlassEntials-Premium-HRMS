{% if messages %}
<div class="toast-container" id="toast-container">
    {% for message in messages %}
    <div class="toast toast-{{ message.tags }}" role="alert">
        <div class="toast-icon">
            <i class="fas {% if message.tags == 'success' %}fa-check-circle{% elif message.tags == 'error' %}fa-exclamation-circle{% elif message.tags == 'warning' %}fa-exclamation-triangle{% else %}fa-info-circle{% endif %}"></i>
        </div>
        <div class="toast-content">
            <div class="toast-title">{{ message.tags|title }}</div>
            <div class="toast-message">{{ message }}</div>
        </div>
        <button class="toast-close" onclick="this.parentElement.remove()">
            <i class="fas fa-times"></i>
        </button>
    </div>
    {% endfor %}
</div>

<style>
    .toast-container {
        position: fixed;
        top: 24px;
        right: 24px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 12px;
        pointer-events: none;
        font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .toast {
        pointer-events: auto;
        min-width: 320px;
        max-width: 420px;
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 20px;
        padding: 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
        animation: toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes toastSlideIn {
        from { opacity: 0; transform: translateX(40px) scale(0.9); }
        to { opacity: 1; transform: translateX(0) scale(1); }
    }

    .toast-icon {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
    }

    .toast-success .toast-icon { background: rgba(34, 197, 94, 0.1); color: #16a34a; }
    .toast-error .toast-icon { background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 2px solid rgba(239, 68, 68, 0.4); }
    .toast-error { border: 2px solid rgba(239, 68, 68, 0.4) !important; background: rgba(255, 245, 245, 0.9) !important; }

    .toast-content { flex: 1; }
    .toast-title { font-size: 14px; font-weight: 800; color: #1a1a2e; margin-bottom: 2px; }
    .toast-message { font-size: 13px; color: #64748b; font-weight: 500; line-height: 1.4; }
    .toast-close { background: none; border: none; color: #64748b; opacity: 0.4; cursor: pointer; padding: 4px; font-size: 14px; }
    .toast-close:hover { opacity: 1; color: #1a1a2e; }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        50% { transform: translateX(5px); }
        75% { transform: translateX(-5px); }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const toasts = document.querySelectorAll('.toast');
        toasts.forEach(toast => {
            if (toast.classList.contains('toast-error')) {
                toast.style.animation = 'toastSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards, shake 0.5s ease-in-out 0.5s';
            }
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    setTimeout(() => toast.remove(), 500);
                }
            }, 6000);
        });
    });
</script>
{% endif %}
