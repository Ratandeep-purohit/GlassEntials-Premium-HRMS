{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HRMS GlassEntials{% endblock %}</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}?v=3.0">
    <link rel="stylesheet" href="{% static 'css/home.css' %}?v=4.3">
    {% block extra_css %}{% endblock %}
</head>

<body>

    <!-- Flash Messages -->

    <!-- Header Navigation -->
    {% include 'includes/navbar.html' %}

    <main class="workspace">
        {% block content %}{% endblock %}
    </main>

    <footer style="margin-top: 60px; padding: 32px 0; border-top: 1px solid var(--border-light); text-align: center; color: var(--text-secondary); font-size: 13px;">
        &copy; 2026 GlassEntials Premium HRMS · Platform Version 4.0.2
    </footer>

    <script src="{% static 'js/ui-effects.js' %}?v=1.0" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
