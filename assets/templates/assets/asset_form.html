{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if asset %}Edit{% else %}Add{% endif %} Asset | GlassEntials</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}?v=3.0">
    <link rel="stylesheet" href="{% static 'css/home.css' %}?v=3.1">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding-top: 84px; }
        .wrapper { max-width: 800px; margin: 40px auto; }
        .card { background: #fff; padding: 40px; border-radius: 16px; border: 1px solid #e2e8f0; }
        h1 { font-family: 'Manrope', sans-serif; font-size: 28px; margin: 0 0 30px; color: #0f172a; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 14px; font-weight: 600; color: #475569; }
        .form-control { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Inter'; font-size: 15px; outline: none; transition: border-color .2s; }
        .form-control:focus { border-color: #2563eb; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 30px; }
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; text-align: center; cursor: pointer; border: none; }
        .btn-primary { background: #2563eb; color: #fff; flex: 1; }
        .btn-secondary { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>
    {% include 'includes/navbar.html' %}
    <div class="wrapper">
        <div class="card">
            <h1>{% if asset %}Edit Asset{% else %}Add New Asset{% endif %}</h1>
            <form method="POST">
                {% csrf_token %}
                <div class="form-grid">
                    <div class="form-group">
                        <label>Asset Code</label>
                        <input type="text" name="asset_code" class="form-control" value="{{ asset.asset_code }}" required {% if asset %}readonly{% endif %}>
                    </div>
                    <div class="form-group">
                        <label>Asset Name</label>
                        <input type="text" name="name" class="form-control" value="{{ asset.name }}" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category_id" class="form-control" required>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {% if asset.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Serial Number</label>
                        <input type="text" name="serial_number" class="form-control" value="{{ asset.serial_number }}">
                    </div>
                    <div class="form-group">
                        <label>Brand</label>
                        <input type="text" name="brand" class="form-control" value="{{ asset.brand }}">
                    </div>
                    <div class="form-group">
                        <label>Model Number</label>
                        <input type="text" name="model_number" class="form-control" value="{{ asset.model_number }}">
                    </div>
                    <div class="form-group">
                        <label>Condition</label>
                        <select name="condition" class="form-control">
                            <option value="EXCELLENT" {% if asset.condition == 'EXCELLENT' %}selected{% endif %}>Excellent</option>
                            <option value="GOOD" {% if asset.condition == 'GOOD' or not asset %}selected{% endif %}>Good</option>
                            <option value="FAIR" {% if asset.condition == 'FAIR' %}selected{% endif %}>Fair</option>
                            <option value="POOR" {% if asset.condition == 'POOR' %}selected{% endif %}>Poor</option>
                        </select>
                    </div>
                    {% if asset %}
                    <div class="form-group">
                        <label>Status</label>
                        <select name="status" class="form-control">
                            <option value="AVAILABLE" {% if asset.status == 'AVAILABLE' %}selected{% endif %}>Available</option>
                            <option value="ASSIGNED" {% if asset.status == 'ASSIGNED' %}selected{% endif %}>Assigned</option>
                            <option value="MAINTENANCE" {% if asset.status == 'MAINTENANCE' %}selected{% endif %}>Maintenance</option>
                            <option value="RETIRED" {% if asset.status == 'RETIRED' %}selected{% endif %}>Retired</option>
                        </select>
                    </div>
                    {% endif %}
                </div>
                <div class="form-group">
                    <label>Physical Location</label>
                    <input type="text" name="location" class="form-control" value="{{ asset.location }}">
                </div>
                
                <div class="btn-group">
                    <a href="{% url 'assets:inventory' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">{% if asset %}Save Changes{% else %}Add Asset{% endif %}</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
