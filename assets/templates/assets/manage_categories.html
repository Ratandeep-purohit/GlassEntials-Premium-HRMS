{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Categories | GlassEntials</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}?v=3.0">
    <link rel="stylesheet" href="{% static 'css/home.css' %}?v=3.0">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding-top: 84px; }
        .wrapper { max-width: 800px; margin: 40px auto; }
        h1 { font-family: 'Manrope', sans-serif; font-size: 32px; color: #0f172a; margin: 0 0 30px; }
        
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 24px; }
        .card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 24px; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-group label { font-size: 14px; font-weight: 600; color: #475569; }
        .form-control { padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Inter'; outline: none; }
        
        .btn-primary { background: #2563eb; color: #fff; padding: 10px 16px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
        
        .cat-list { list-style: none; padding: 0; margin: 0; }
        .cat-item { display: flex; align-items: center; gap: 12px; padding: 16px 0; border-bottom: 1px solid #f1f5f9; }
        .cat-item:last-child { border-bottom: none; }
        .cat-icon { width: 40px; height: 40px; border-radius: 8px; background: #eff6ff; color: #3b82f6; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .cat-name { font-weight: 600; color: #1e293b; }
    </style>
</head>
<body>
    {% include 'includes/navbar.html' %}
    <div class="wrapper">
        <h1>Asset Categories</h1>
        <div class="grid">
            <div class="card">
                <h3 style="margin-top: 0;">Add Category</h3>
                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label>Category Name</label>
                        <input type="text" name="name" class="form-control" required placeholder="e.g. Laptop">
                    </div>
                    <div class="form-group">
                        <label>FontAwesome Icon Class</label>
                        <input type="text" name="icon" class="form-control" value="fa-box" placeholder="fa-laptop">
                    </div>
                    <button type="submit" class="btn-primary">Add Category</button>
                </form>
            </div>
            
            <div class="card">
                <h3 style="margin-top: 0;">Existing Categories</h3>
                <ul class="cat-list">
                    {% for cat in categories %}
                    <li class="cat-item">
                        <div class="cat-icon"><i class="fas {{ cat.icon }}"></i></div>
                        <div class="cat-name">{{ cat.name }}</div>
                    </li>
                    {% empty %}
                    <li class="cat-item" style="color: #64748b;">No categories defined.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
