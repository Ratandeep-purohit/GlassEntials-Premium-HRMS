{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assign Asset | GlassEntials</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/landing.css' %}?v=3.0">
    <link rel="stylesheet" href="{% static 'css/home.css' %}?v=3.1">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding-top: 84px; }
        .wrapper { max-width: 600px; margin: 40px auto; }
        .card { background: #fff; padding: 40px; border-radius: 16px; border: 1px solid #e2e8f0; }
        h1 { font-family: 'Manrope', sans-serif; font-size: 24px; margin: 0 0 10px; color: #0f172a; }
        .asset-info { padding: 16px; background: #f1f5f9; border-radius: 8px; margin-bottom: 24px; font-size: 14px; color: #475569; }
        
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
        .form-group label { font-size: 14px; font-weight: 600; color: #475569; }
        .form-control { padding: 12px 16px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: 'Inter'; font-size: 15px; outline: none; }
        
        .btn-group { display: flex; gap: 12px; margin-top: 30px; }
        .btn { padding: 12px 24px; border-radius: 8px; font-weight: 600; text-decoration: none; text-align: center; cursor: pointer; border: none; }
        .btn-primary { background: #2563eb; color: #fff; flex: 1; }
        .btn-secondary { background: #f1f5f9; color: #475569; }
    </style>
</head>
<body>
    {% include 'includes/navbar.html' %}
    <div class="wrapper">
        <div class="card">
            <h1>Assign Asset</h1>
            <div class="asset-info">
                <strong>{{ asset.asset_code }}</strong> - {{ asset.name }}<br>
                Current Condition: {{ asset.get_condition_display }}
            </div>
            <form method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label>Employee</label>
                    <select name="employee_id" class="form-control" required>
                        <option value="">Select an employee...</option>
                        {% for emp in employees %}
                        <option value="{{ emp.id }}">{{ emp.first_name }} {{ emp.last_name }} ({{ emp.employee_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Condition at Issue</label>
                    <select name="condition_at_issue" class="form-control">
                        <option value="EXCELLENT" {% if asset.condition == 'EXCELLENT' %}selected{% endif %}>Excellent</option>
                        <option value="GOOD" {% if asset.condition == 'GOOD' %}selected{% endif %}>Good</option>
                        <option value="FAIR" {% if asset.condition == 'FAIR' %}selected{% endif %}>Fair</option>
                        <option value="POOR" {% if asset.condition == 'POOR' %}selected{% endif %}>Poor</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Expected Return Date (Optional)</label>
                    <input type="date" name="expected_return_date" class="form-control">
                </div>
                
                <div class="btn-group">
                    <a href="{% url 'assets:inventory' %}" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Assign Asset</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
